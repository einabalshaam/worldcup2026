  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d2137, var(--navy3));
    border-bottom: 2px solid var(--gold);
    padding: 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .header-inner { max-width: 860px; margin: 0 auto; }
  .header-top {
    display: flex; align-items: center; gap: 12; margin-bottom: 14px;
  }
  .trophy { font-size: 30px; }
  .title-wrap { flex: 1; }
  .title { font-size: 18px; font-weight: 800; color: var(--gold); line-height: 1.2; }
  .subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .match-count { text-align: left; }
  .match-count .num { font-size: 24px; font-weight: 800; color: var(--gold); }
  .match-count .lbl { font-size: 10px; color: var(--muted); }

  /* ── Stage Tabs ── */
  .tabs {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.2s;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--gold), #e6a800);
    color: var(--navy);
    border-color: transparent;
    font-weight: 700;
  }

  /* ── Group Filter ── */
  .group-filters {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 14px 16px 6px;
    max-width: 860px; margin: 0 auto;
  }
  .gf-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted);
    border-radius: 16px; padding: 4px 12px;
    font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 600;
    transition: all 0.15s;
  }
  .gf-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(240,192,64,0.1);
  }

  /* ── Content ── */
  .content { max-width: 860px; margin: 0 auto; padding: 16px; }

  /* ── Date Header ── */
  .date-header {
    display: flex; align-items: center; gap: 10; margin-bottom: 10px; margin-top: 20px;
  }
  .date-header:first-child { margin-top: 0; }
  .date-pill {
    background: linear-gradient(135deg, var(--navy3), #0f2540);
    color: var(--gold);
    padding: 4px 14px; border-radius: 20px;
    font-weight: 700; font-size: 12px;
    border: 1px solid rgba(240,192,64,0.3);
    white-space: nowrap;
  }
  .date-line { flex: 1; height: 1px; background: var(--border); }

  /* ── Match Card ── */
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    display: flex; align-items: center; gap: 10;
    margin-bottom: 7px;
  }
  .match-card.knockout {
    border-color: rgba(240,192,64,0.15);
  }
  .group-badge {
    border-radius: 7px; padding: 2px 8px;
    font-size: 11px; font-weight: 700;
    min-width: 26px; text-align: center; flex-shrink: 0;
  }
  .ko-badge {
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.3);
    color: var(--gold);
    border-radius: 7px; padding: 2px 7px;
    font-size: 10px; font-weight: 700;
    min-width: 30px; text-align: center; flex-shrink: 0;
  }
  .match-info { flex: 1; min-width: 0; }
  .match-teams {
    font-weight: 700; font-size: 13px; color: white;

    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .vs { color: rgba(255,255,255,0.25); margin: 0 4px; }
  .match-venue {
    font-size: 11px; color: var(--muted);

  }
  .match-time-col { text-align: left; flex-shrink: 0; }
  .match-date-small { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .time-badge {
    font-size: 12px; font-weight: 700; color: var(--gold);
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.2);
    padding: 2px 9px; border-radius: 8px;
  }

  /* ── Final Stage ── */
  .final-hero {
    background: linear-gradient(135deg, #1a2540, #0d1a30);
    border: 2px solid var(--gold);
    border-radius: 16px; padding: 24px;
    text-align: center; margin-bottom: 16px;
  }
  .final-icon { font-size: 40px; margin-bottom: 8px; }
  .final-title { color: var(--gold); font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .final-date { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .final-teams { font-size: 20px; font-weight: 800; color: white; margin-bottom: 8px; }
  .final-venue { color: var(--muted); font-size: 12px; }

  /* ── Summary Table (for print) ── */
  .stage-info {
    display: flex; gap: 8; flex-wrap: wrap; margin-bottom: 16px;
  }
  .stage-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
    font-size: 11px; flex: 1; min-width: 120px; text-align: center;
  }
  .stage-chip .sc-title { color: var(--muted); margin-bottom: 3px; }
  .stage-chip .sc-val { color: var(--gold); font-weight: 700; font-size: 13px; }

  /* ── Footer ── */
  footer {
    text-align: center; padding: 14px;
    color: rgba(147,180,212,0.5); font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }

      background: white !important;

    }

function matchCard(m, opts={}) {
  const gc = opts.group ? GC[opts.group] : null;
  const badge = opts.group
    ? `<div class="group-badge" style="background:${gc}22;border:1px solid ${gc};color:${gc}">${opts.group}</div>`
    : opts.ko
    ? `<div class="ko-badge">م${m.m}</div>`
    : '';
  return `
  <div class="match-card ${opts.ko?'knockout':''}">
    ${badge}
    <div class="match-info">
      <div class="match-teams">${m.t1} <span class="vs">–</span> ${m.t2}</div>
      <div class="match-venue">🏟️ ${m.v}</div>
    </div>
    <div class="match-time-col">
      ${m.date?`<div class="match-date-small">${m.date}</div>`:''}
      <div class="time-badge">${m.time}</div>
    </div>
  </div>`;
}

let lastFetch = 0;
const CACHE_MS = 5 * 60 * 1000; // 5 دقائق

async function fetchStandings() {
  const now = Date.now();
  if (now - lastFetch < CACHE_MS && Object.keys(liveStandings).length > 0) return;
  try {
    // نستخدم API مجاني للبطولات
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/standings', {
      headers: { 'X-Auth-Token': '1f5e4d7b8c9a2e3f6g7h8i9j0k1l2m3n' }
    });
    // إذا فشل API نجرب مصدراً آخر
    throw new Error('try next');
  } catch(e) {
    try {
      // مصدر بديل: ESPN API
      const res = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
      if (!res.ok) throw new Error('ESPN failed');
      const data = await res.json();
      parseESPN(data);
      lastFetch = Date.now();
      updateKnockouts();
      render();
    } catch(e2) {
      // مصدر ثالث: نجرب fifa.com غير الرسمي
      try {
        const res = await fetch('https://api.fifa.com/api/v3/calendar/matches?idCompetition=17&idSeason=278478&idStageType=285063&count=200');
        if (!res.ok) throw new Error('FIFA failed');
        const data = await res.json();
        parseFIFA(data);
        lastFetch = Date.now();
        updateKnockouts();
        render();
      } catch(e3) {
        console.log('سيتم التحديث عند توفر الإنترنت');
      }
    }
  }
}

function parseESPN(data) {
  try {
    const groups = data.children || data.standings || [];
    groups.forEach(group => {
      const gName = (group.name||group.abbreviation||'').replace('Group ','').trim();
      if (!gName || gName.length > 1) return;
      const entries = (group.standings||{}).entries || group.entries || [];
      liveStandings[gName] = entries
        .sort((a,b) => (a.stats?.find(s=>s.name==='rank')?.value||99) - (b.stats?.find(s=>s.name==='rank')?.value||99))
        .map(e => teamNameAr[e.team?.displayName] || teamNameAr[e.team?.name] || e.team?.displayName || '');
    });
  } catch(e) {}
}

function parseFIFA(data) {
  try {
    const results = data.Results || data.results || [];
    const grouped = {};
    results.forEach(m => {
      const g = m.GroupName?.replace('Group ','').trim();
      if (!g || g.length>1) return;
      if (!grouped[g]) grouped[g] = {};
      const processTeam = (team, gf, ga, pts) => {
        const nm = teamNameAr[team.TeamName?.[0]?.Description] || team.TeamName?.[0]?.Description || '';
        if (!nm) return;
        if (!grouped[g][nm]) grouped[g][nm] = {pts:0, gd:0};
        grouped[g][nm].pts += pts;
        grouped[g][nm].gd += (gf - ga);
      };
      const hg = m.HomeTeamScore, ag = m.AwayTeamScore;
      if (hg == null) return;
      const hpts = hg>ag?3:hg===ag?1:0, apts = ag>hg?3:ag===hg?1:0;
      processTeam(m.Home, hg, ag, hpts);
      processTeam(m.Away, ag, hg, apts);
    });
    Object.keys(grouped).forEach(g => {
      liveStandings[g] = Object.entries(grouped[g])
        .sort((a,b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd)
        .map(e => e[0]);
    });
  } catch(e) {}
}

function updateKnockouts() {
  const stages = ['r32','r16','qf','sf','third','final'];
  stages.forEach(stage => {
    knockouts[stage].forEach(match => {
      ['t1','t2'].forEach(field => {
        const placeholder = match[field];
        const info = placeholderMap[placeholder];
        if (info && liveStandings[info.g] && liveStandings[info.g].length >= info.rank) {
          const realName = liveStandings[info.g][info.rank - 1];
          if (realName) match[field] = realName;
        }
      });
    });
  });
}

  let el = document.getElementById('sync-status');

  el.textContent = msg;
  el.style.color = ok ? '#4caf50' : '#f0c040';
  setTimeout(() => { el.textContent = ''; }, 4000);
}

  showSyncStatus(Object.keys(liveStandings).length > 0 ? '✅ تم التحديث' : '⚠️ لا يوجد اتصال', Object.keys(liveStandings).length > 0);
}
